services:
  - type: web
    name: executive-insights-engine
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python -m uvicorn api:app --host 0.0.0.0 --port $PORT --app-dir src
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-3.5-flash-lite
      - key: GEMINI_FALLBACK_MODELS
        value: gemini-3.1-flash-lite,gemini-flash-lite-latest,gemini-3.6-flash
      - key: GEMINI_TIMEOUT_SECONDS
        value: 60
      - key: GEMINI_MAX_OUTPUT_TOKENS
        value: 900
      - key: GEMINI_USE_SYSTEM_CERTS
        value: true
